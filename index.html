<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Gallery</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #ffffff;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 24px;
  }
  .list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-radius: 12px;
    background: #262626;
    color: #ffffff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
  }
  a.card:active {
    background: #303030;
  }
  a.card .arrow {
    color: rgba(255,255,255,0.4);
    font-size: 18px;
  }
  .empty {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>3D model gallery</h1>
  <div class="list" id="list"></div>
</div>

<script>
  /*
    ADD A NEW DESIGN:
    Just add one line below — { name: "...", file: "3D-Designs/FOLDER/model.glb" } —
    matching the folder name you upload into 3D-Designs/.
  */
  const designs = [
    { name: "Design 1", file: "3D-Designs/design1/model.glb" },
    { name: "Design 2", file: "3D-Designs/design2/model.glb" },
  ];

  const list = document.getElementById('list');

  if (designs.length === 0) {
    list.innerHTML = '<p class="empty">No designs added yet.</p>';
  } else {
    designs.forEach(d => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = 'viewer.html?model=' + encodeURIComponent(d.file) + '&name=' + encodeURIComponent(d.name);
      a.innerHTML = '<span>' + d.name + '</span><span class="arrow">&#8250;</span>';
      list.appendChild(a);
    });
  }
</script>
</body>
</html>
