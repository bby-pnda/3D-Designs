<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Gallery</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #ffffff;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 24px;
  }
  .list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  a.card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-radius: 12px;
    background: #262626;
    color: #ffffff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
  }
  a.card:active {
    background: #303030;
  }
  a.card .arrow {
    color: rgba(255,255,255,0.4);
    font-size: 18px;
  }
  .empty {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>3D model gallery</h1>
  <div class="list" id="list"></div>
</div>

<script>
  /*
    SETUP (one time only):
    Fill in your GitHub username and repo name below.
    After that, just upload .glb files into the 3D-Designs/ folder —
    they'll appear here automatically. No code edits needed.
  */
  const GITHUB_USER = "YOUR-USERNAME";
  const GITHUB_REPO = "3D-Designs";
  const FOLDER = "3D-Designs";

  const list = document.getElementById('list');

  // Turn "my-cool_design2.glb" into "My Cool Design2"
  function prettyName(filename) {
    return filename
      .replace(/\.glb$/i, '')
      .replace(/[-_]+/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  async function loadDesigns() {
    try {
      const res = await fetch(
        'https://api.github.com/repos/' + GITHUB_USER + '/' + GITHUB_REPO + '/contents/' + FOLDER
      );
      if (!res.ok) throw new Error('GitHub API returned ' + res.status);
      const items = await res.json();

      const glbs = items.filter(f => f.type === 'file' && /\.glb$/i.test(f.name));

      if (glbs.length === 0) {
        list.innerHTML = '<p class="empty">No designs added yet. Upload a .glb file into the ' + FOLDER + '/ folder.</p>';
        return;
      }

      glbs.forEach(f => {
        const name = prettyName(f.name);
        const a = document.createElement('a');
        a.className = 'card';
        a.href = 'viewer.html?model=' + encodeURIComponent(FOLDER + '/' + f.name) + '&name=' + encodeURIComponent(name);
        a.innerHTML = '<span>' + name + '</span><span class="arrow">&#8250;</span>';
        list.appendChild(a);
      });
    } catch (err) {
      list.innerHTML = '<p class="empty">Could not load the design list. Check that GITHUB_USER and GITHUB_REPO are set correctly at the top of index.html.</p>';
      console.error(err);
    }
  }

  loadDesigns();
</script>
</body>
</html>
