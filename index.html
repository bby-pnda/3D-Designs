<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Model Viewer</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  model-viewer {
    width: 100%;
    height: 100vh;
    background-color: #1a1a1a;
    --poster-color: transparent;
  }
  .hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    letter-spacing: 0.02em;
    pointer-events: none;
    text-align: center;
    width: 90%;
  }
  .ar-button {
    position: absolute;
    bottom: 24px;
    right: 24px;
    background: #ffffff;
    border-radius: 999px;
    border: none;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>

  <!--
    Replace "model.glb" below with the exact filename of your model.
    Keep the .glb file in the SAME folder as this index.html file
    when you upload / host them.
  -->
  <model-viewer
    src="model.glb"
    alt="3D model"
    camera-controls
    auto-rotate
    auto-rotate-delay="1500"
    rotation-per-second="20deg"
    shadow-intensity="1"
    exposure="1"
    ar
    ar-modes="webxr scene-viewer quick-look"
    poster="">
    <button slot="ar-button" class="ar-button">View in your space</button>
  </model-viewer>

  <div class="hint">Drag to rotate &bull; Pinch to zoom</div>

</body>
</html>
